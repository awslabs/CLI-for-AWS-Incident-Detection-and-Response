  - name: "IDR-DynamoDB-ReplicationLatency"
    service: "DynamoDB"
    alarm_type: "RELIABILITY"
    metric_type: "CONDITIONAL"
    description: "Monitors replication latency for global tables"
    configuration:
      AlarmName: "IDR-DynamoDB-ReplicationLatency-${table_name}-${receiving_region}"
      MetricName: "ReplicationLatency"
      Namespace: "AWS/DynamoDB"
      Statistic: "Average"
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 1000.0
      ComparisonOperator: "GreaterThanOrEqualToThreshold"
      TreatMissingData: "notBreaching"
      Dimensions: [
        {
          Name: "TableName",
          Value: "${table_name}"
        },
        {
          Name: "ReceivingRegion",
          Value: "${receiving_region}"
        }
      ]
    Tags: [
      {
        Key: "AlarmType",
        Value: "IDR-BestPractice"
      },
      {
        Key: "Service",
        Value: "DynamoDB"
      }
    ]
